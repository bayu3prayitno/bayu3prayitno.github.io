<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Belum Tersedia</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body,
      html {
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }

      .container {
        position: relative;
        height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 1;
      }

      .text {
        color: #fff;
        text-align: center;
        z-index: 10;
        animation: fadeIn 2s ease-in-out forwards;
      }

      .text h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        animation: slideIn 2s ease-in-out forwards;
      }

      .text p {
        font-size: 1.2rem;
        animation: pulse 3s infinite;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes slideIn {
        from {
          transform: translateY(-30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .wave {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 200%;
        height: 100%;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 45%;
        animation: waveMove 6s linear infinite;
        z-index: 0;
      }

      .wave:nth-child(2) {
        animation-delay: -3s;
        opacity: 0.3;
      }

      @keyframes waveMove {
        0% {
          transform: translateX(0) translateY(0);
        }
        100% {
          transform: translateX(-50%) translateY(0);
        }
      }

      .icon {
        font-size: 5rem;
        color: #ffffff90;
        margin-bottom: 1rem;
        animation: bounce 2s infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      @media (max-width: 600px) {
        .text h1 {
          font-size: 2rem;
        }
        .icon {
          font-size: 3rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🚧</div>
      <div class="text">
        <h1>Halaman Belum Tersedia</h1>
        <p>Sedang dalam pengembangan, silakan kembali nanti</p>
      </div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>
  </body>
</html>
